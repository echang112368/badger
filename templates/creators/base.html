<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Creator Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="d-flex">
    <nav id="sidebar" class="d-flex flex-column flex-shrink-0 p-3 bg-light vh-100 position-sticky top-0" style="width:18%;">
        <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-decoration-none">
            <span class="fs-5 fw-semibold">Creator</span>
        </a>
        <hr>
        {% with request.resolver_match.url_name as current_url %}
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item"><a href="{% url 'creator_dashboard' %}" class="nav-link {% if current_url == 'creator_dashboard' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li><a href="{% url 'creator_earnings' %}" class="nav-link {% if current_url == 'creator_earnings' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-cash-stack me-2"></i>Earnings</a></li>
            <li><a href="{% url 'creator_affiliate_companies' %}" class="nav-link {% if current_url == 'creator_affiliate_companies' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-building me-2"></i>Affiliate Companies</a></li>
            <li><a href="{% url 'creator_my_links' %}" class="nav-link {% if current_url == 'creator_my_links' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-link-45deg me-2"></i>My Links</a></li>
            <li><a href="{% url 'creator_settings' %}" class="nav-link {% if current_url == 'creator_settings' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-gear me-2"></i>Settings</a></li>
            <li><a href="{% url 'creator_support' %}" class="nav-link {% if current_url == 'creator_support' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-life-preserver me-2"></i>Support</a></li>
            <li><a href="{% url 'logout' %}" class="nav-link text-dark"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
        </ul>
        {% endwith %}
    </nav>

    <div class="flex-grow-1">
        <button class="btn btn-outline-secondary d-md-none m-2" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar" aria-controls="sidebar" aria-expanded="false" aria-label="Toggle navigation">
            <i class="bi bi-list"></i>
        </button>
        <main id="content" class="container-fluid px-3 fade-in">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('time.local-time').forEach(function(el){
        var iso = el.getAttribute('datetime');
        if(iso){
            var date = new Date(iso);
            if(!isNaN(date)){
                el.textContent = date.toLocaleString();
            }
        }
    });
</script>
</body>
</html>
