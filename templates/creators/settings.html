{% extends 'creators/base.html' %}
{% block title %}Settings{% endblock %}
{% block content %}
<section class="my-4">
    <h1 class="fw-bold fs-3 mb-4">Settings</h1>
    <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-md-6">
            <label for="paypal_email" class="form-label">PayPal Email</label>
            <input type="email" id="paypal_email" name="paypal_email" class="form-control" value="{{ creator_meta.paypal_email }}">
        </div>
        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="autopay">
                <label class="form-check-label" for="autopay">Enable Autopay</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="notifications">
                <label class="form-check-label" for="notifications">Email Notifications</label>
            </div>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Save</button>
        </div>
    </form>
</section>
{% endblock %}
