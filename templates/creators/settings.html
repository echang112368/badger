{% extends 'creators/base.html' %}
{% block title %}Settings{% endblock %}
{% block content %}
<section class="my-4">
    <h1 class="fw-bold fs-3 mb-4">Settings</h1>
    <div class="card shadow-sm rounded mb-3">
        <div class="card-body">
            <p class="mb-1 fw-bold">Your Email</p>
            <p class="mb-0">{{ creator.email }}</p>
        </div>
    </div>

    <div class="card shadow-sm rounded mb-3">
        <div class="card-body">
            <p class="mb-1 fw-bold">Your Password</p>
            <p class="mb-0">{{ creator.password }}</p>
        </div>
    </div>

    <div class="card shadow-sm rounded mb-3">
        <div class="card-body">
            <p class="mb-1 fw-bold">Your UUID</p>
            <p class="mb-0">{{ creator_meta.uuid }}</p>
        </div>
    </div>

    <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-md-6">
            <label class="form-label">{{ user_form.first_name.label }}</label>
            {{ user_form.first_name }}
        </div>
        <div class="col-md-6">
            <label class="form-label">{{ user_form.last_name.label }}</label>
            {{ user_form.last_name }}
        </div>
        <div class="col-md-6">
            <label for="paypal_email" class="form-label">PayPal Email</label>
            <input type="email" id="paypal_email" name="paypal_email" class="form-control" value="{{ creator_meta.paypal_email }}">
        </div>
        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="autopay">
                <label class="form-check-label" for="autopay">Enable Autopay</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="notifications">
                <label class="form-check-label" for="notifications">Email Notifications</label>
            </div>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Save</button>
        </div>
    </form>
</section>
{% endblock %}
