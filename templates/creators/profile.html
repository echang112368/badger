{% extends 'creators/base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
<script src="https://cdn.tailwindcss.com"></script>
<div class="max-w-3xl mx-auto py-10 px-4">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-gray-900">Profile</h1>
    <div>
      <input type="text" placeholder="Search" class="w-64 rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-indigo-500" />
    </div>
  </div>
  <form id="profileForm" method="post" action="{% url 'creator_profile' %}" class="space-y-8">
    {% csrf_token %}
    <div class="bg-white shadow-sm rounded-lg p-6">
      <h2 class="text-lg font-semibold text-gray-900">Profile</h2>
      <p class="text-sm text-gray-500 mb-6">Update your business and account details here.</p>
      <div class="grid gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Creator Name</label>
          <input type="text" name="creator_name" value="{{ creator.get_full_name|default_if_none:'' }}" class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Creator UUID</label>
          <div class="w-full rounded-md border border-gray-200 bg-gray-50 px-3 py-2 text-sm text-gray-700">{{ creator_meta.uuid }}</div>
        </div>
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input type="text" name="first_name" value="{{ user_form.first_name.value|default_if_none:'' }}" class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input type="text" name="last_name" value="{{ user_form.last_name.value|default_if_none:'' }}" class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" name="email" placeholder="example@email.com" value="{{ creator.email }}" class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Social Media Platform</label>
          <input type="text" name="social_media_platform" placeholder="Instagram, YouTube, TikTok" value="{{ creator_meta.social_media_platform|default_if_none:'' }}" class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Follower Range</label>
          <select name="follower_range" class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="" {% if not creator_meta.follower_range %}selected{% endif %}>Select a range</option>
            <option value="0-1k" {% if creator_meta.follower_range == "0-1k" %}selected{% endif %}>0-1k</option>
            <option value="1k-10k" {% if creator_meta.follower_range == "1k-10k" %}selected{% endif %}>1k-10k</option>
            <option value="10k-50k" {% if creator_meta.follower_range == "10k-50k" %}selected{% endif %}>10k-50k</option>
            <option value="50k-100k" {% if creator_meta.follower_range == "50k-100k" %}selected{% endif %}>50k-100k</option>
            <option value="100k+" {% if creator_meta.follower_range == "100k+" %}selected{% endif %}>100k+</option>
          </select>
        </div>
      </div>
    </div>
  </form>
  <div class="fixed bottom-6 right-6">
    <button type="submit" form="profileForm" class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">Save Changes</button>
  </div>
</div>
{% endblock %}
