{% extends "merchants/base.html" %}
{% block content %}
<div class="container py-4">
  <h1 class="mb-3">Shopify Billing</h1>
  <p class="lead">Shop: {{ shop_domain }}</p>
  <div class="alert {% if status_code == 200 %}alert-success{% else %}alert-warning{% endif %}">
    {{ message }}
  </div>
  <p>You may now close this window and return to the Shopify admin.</p>
</div>
{% endblock %}
