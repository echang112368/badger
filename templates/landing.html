<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Badger &mdash; Earn More. Save More.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: light;
      }
    </style>
  </head>
  <body class="min-h-full bg-[#f9fafb] font-['Inter',_'Poppins',_'Helvetica',_'Arial',_sans-serif] text-gray-900">
    <main>
      <section class="relative overflow-hidden">
        <div class="mx-auto flex max-w-6xl flex-col gap-16 px-6 py-20 lg:grid lg:grid-cols-2 lg:items-center lg:gap-12 lg:px-8 lg:py-24">
          <div class="space-y-8">
            <img
              src="/static/img/transparent-logo.png"
              alt="Badger logo"
              class="h-12 w-auto"
            />
            <div class="space-y-6">
              <h1 class="text-4xl font-bold tracking-tight sm:text-5xl">Earn More. Save More. With Badger.</h1>
              <p class="max-w-xl text-lg leading-relaxed text-[#555555]">
                Your all-in-one affiliate extension for creators and businesses. Track rewards, grow income, and redeem easily.
              </p>
            </div>
            <div>
              <a
                href="#download"
                class="inline-flex items-center justify-center rounded-xl bg-[#2bf8ff] px-8 py-4 text-lg font-semibold text-white shadow-sm transition-colors duration-200 ease-out hover:bg-[#24d9df] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#1fb3bd]"
              >
                Download Extension
              </a>
            </div>
          </div>
          <div class="relative flex justify-center lg:justify-end">
            <div class="relative max-w-xl">
              <div class="absolute -inset-6 rounded-[40px] bg-[#2bf8ff]/10 blur-3xl"></div>
              <img
                src="/static/img/money-jar-71.png"
                alt="Illustration of a Badger-branded money jar filled with teal coins"
                class="relative z-10 w-full max-w-md drop-shadow-2xl"
              />
              <div class="absolute -top-10 -right-8 hidden h-24 w-24 rounded-full border-4 border-[#2bf8ff]/60 bg-white/70 backdrop-blur lg:block"></div>
              <div class="absolute -bottom-12 -left-10 hidden h-32 w-32 rounded-full border border-[#2bf8ff]/40 bg-[#2bf8ff]/20 blur-lg lg:block"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
