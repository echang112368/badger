{% load i18n %}
{% if change and original %}
  {% if wrapper_tag %}<{{ wrapper_tag }}{% if wrapper_attrs %} {{ wrapper_attrs }}{% endif %}>{% endif %}
  <form method="post"
        action="{% url 'admin:merchantlist_config_publish' original.pk %}"
        {% if form_class %}class="{{ form_class }}"{% endif %}
        style="{{ form_style|default:'display:inline-block;margin-left:0.5rem;' }}">
    {% csrf_token %}
    <button type="submit"
            class="{{ button_class|default:'button' }}"
            {% if button_style %}style="{{ button_style }}"{% endif %}>
      {% trans "Publish merchant list" %}
    </button>
  </form>
  {% if wrapper_tag %}</{{ wrapper_tag }}>{% endif %}
{% endif %}
