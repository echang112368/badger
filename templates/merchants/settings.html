{% extends 'merchants/base.html' %}
{% block title %}Settings{% endblock %}
{% block content %}
<section class="my-4">
    <h1 class="fw-bold fs-3 mb-4">Settings</h1>

    <div class="card shadow-sm rounded mb-3">
        <div class="card-body">
            <p class="mb-1 fw-bold">Your UUID</p>
            <p class="mb-0">{{ merchant_meta.uuid }}</p>
        </div>
    </div>

    <form method="post" action="{% url 'merchant_settings' %}">
        {% csrf_token %}

        <div class="card shadow-sm rounded mb-3">
            <div class="card-body">
                <label class="form-label fw-bold d-block">{{ settings_form.paypal_email.label }}</label>
                {{ settings_form.paypal_email }}
            </div>
        </div>

        <div class="card shadow-sm rounded mb-3">
            <div class="card-body">
                <label class="form-label fw-bold d-block">Shopify Key and Password</label>
                <label class="form-label d-block mt-2 mb-1">Key:</label>
                {{ settings_form.shopify_api_key }}
                <label class="form-label d-block mt-3 mb-1">Password:</label>
                {{ settings_form.shopify_api_password }}
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</section>
{% endblock %}
