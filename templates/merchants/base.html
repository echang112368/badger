<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Merchant Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="d-flex">
    <nav id="sidebar" class="d-flex flex-column flex-shrink-0 p-3 bg-light vh-100 position-sticky top-0" style="width:18%;">
        <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-decoration-none">
            <span class="fs-5 fw-semibold">Merchant</span>
        </a>
        <hr>
        {% with request.resolver_match.url_name as current_url %}
        <ul class="nav nav-pills flex-column mb-auto">
            <li><a href="{% url 'merchant_dashboard' %}" class="nav-link {% if current_url == 'merchant_dashboard' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li><a href="{% url 'merchant_creators' %}" class="nav-link {% if current_url == 'merchant_creators' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-people me-2"></i>Creators</a></li>
            <li><a href="{% url 'merchant_items' %}" class="nav-link {% if current_url == 'merchant_items' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-plus-square me-2"></i>Items</a></li>
            <li><a href="{% url 'shopify_settings' %}" class="nav-link {% if current_url == 'shopify_settings' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-bag me-2"></i>Shopify</a></li>
            <li><a href="{% url 'merchant_settings' %}" class="nav-link {% if current_url == 'merchant_settings' %}bg-primary text-white{% else %}text-dark{% endif %}"><i class="bi bi-gear me-2"></i>Settings</a></li>
            <li><a href="#" class="nav-link text-dark" data-bs-toggle="modal" data-bs-target="#logoutModal"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
        </ul>
        {% endwith %}
    </nav>

    <div class="flex-grow-1">
        <button class="btn btn-outline-secondary d-md-none m-2" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar" aria-controls="sidebar" aria-expanded="false" aria-label="Toggle navigation">
            <i class="bi bi-list"></i>
        </button>
        <main id="content" class="container-fluid px-3 fade-in">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<!-- Logout Confirmation Modal -->
<div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="logoutModalLabel">Confirm Logout</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to logout?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <a href="{% url 'logout' %}" class="btn btn-primary">Logout</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('time.local-time').forEach(function(el){
        var iso = el.getAttribute('datetime');
        if(iso){
            var date = new Date(iso);
            if(!isNaN(date)){
                el.textContent = date.toLocaleString();
            }
        }
    });
</script>
</body>
</html>
