{% extends 'customer/base.html' %}
{% block title %}Settings{% endblock %}
{% block content %}
<section class="my-4">
    <h1 class="fw-bold fs-3 mb-4">Settings</h1>
    <div class="card shadow-sm rounded mb-3">
        <div class="card-body">
            <p class="mb-1 fw-bold">Your Email</p>
            <p class="mb-0">{{ customer.email }}</p>
        </div>
    </div>
    <div class="card shadow-sm rounded mb-3">
        <div class="card-body">
            <p class="mb-1 fw-bold">Your UUID</p>
            <p class="mb-0">{{ customer_meta.uuid }}</p>
        </div>
    </div>
</section>
{% endblock %}
