<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shopify Billing Status</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: #f1f5f9;
        color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .panel {
        background: #ffffff;
        padding: 32px;
        border-radius: 12px;
        max-width: 520px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 12px;
      }
      p {
        font-size: 1rem;
        margin: 0;
        line-height: 1.6;
      }
      .shop {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Shopify Billing Update</h1>
      {% if shop_domain %}
      <p class="shop">Store: {{ shop_domain }}</p>
      {% endif %}
      <p>{{ message }}</p>
    </div>
  </body>
</html>
